{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
        <div>
            <h3 class="fw-bold text-danger mb-0"><i class="fas fa-clipboard-list me-2"></i>Log Incident</h3>
            <p class="text-muted mb-0">Record behavioral, injury, or disciplinary incidents to the database.</p>
        </div>
        <div>
            <a href="{% url 'management:needs_attention' %}" class="btn btn-outline-danger rounded-pill me-2"><i class="fas fa-exclamation-triangle me-2"></i>Needs Attention</a>
            <a href="{% url 'management:dashboard' %}" class="btn btn-outline-secondary rounded-pill"><i class="fas fa-arrow-left me-2"></i>Back to Dashboard</a>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-6 mt-3">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden border-top border-danger border-4">
                <div class="card-body p-5">
                    <h4 class="fw-bold mb-4 text-center">New Incident Report</h4>
                    <form action="{% url 'management:log_incident' %}" method="post">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label fw-bold small text-muted">Select Athlete</label>
                            <select name="athlete_id" class="form-select border-2 p-2 rounded-3" required>
                                <option value="">-- Choose Athlete --</option>
                                {% for a in athletes %}
                                <option value="{{ a.id }}" {% if request.GET.preselect == a.id|stringformat:"s" %}selected{% endif %}>{{ a.user.username }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold small text-muted">Incident Description</label>
                            <textarea name="description" class="form-control border-2 rounded-3" rows="5" placeholder="Detail the event exactly as it happened..." required></textarea>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold small text-muted">Date of Incident</label>
                            <input type="date" name="date" class="form-control border-2 p-2 rounded-3" required>
                        </div>
                        <div class="d-grid mt-5">
                            <button type="submit" class="btn btn-danger fw-bold rounded-pill p-3" style="font-size: 1.1rem;">
                                Submit
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
